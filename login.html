<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - IGNOU Solution Hub</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#fff;
padding:30px;
width:320px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}
input{
width:100%;
padding:10px;
margin:10px 0;
box-sizing:border-box;
}
button{
width:100%;
padding:10px;
background:#0066cc;
color:#fff;
border:none;
cursor:pointer;
}
button:hover{
background:#004999;
}
</style>

</head>
<body>

<div class="box">
<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>

</body>
</html>
