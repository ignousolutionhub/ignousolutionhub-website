<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGNOU Solution Hub - Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#0066cc;
    color:#fff;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    font-size:24px;
}

.logout{
    background:red;
    color:#fff;
    padding:10px 15px;
    text-decoration:none;
    border-radius:5px;
}

.container{
    width:90%;
    max-width:1100px;
    margin:30px auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    margin-bottom:10px;
}

.card a{
    display:inline-block;
    margin-top:15px;
    background:#0066cc;
    color:#fff;
    padding:10px 20px;
    text-decoration:none;
    border-radius:5px;
}

.card a:hover{
    background:#004999;
}
</style>

</head>

<body>

<header>
<h2>IGNOU Solution Hub Admin</h2>
<a href="#" id="logoutBtn" class="logout">Logout</a>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Add Product</h3>
<p>Upload Assignments, Projects, Practicals & PDFs.</p>
<a href="add-product.html">Open</a>
</div>

<div class="card">
<h3>Manage Products</h3>
<p>Edit or Delete uploaded products.</p>
<a href="products.html">Open</a>
</div>

<div class="card">
<h3>Orders</h3>
<p>Student orders will appear here.</p>
<a href="#">Coming Soon</a>
</div>

<div class="card">
<h3>Students</h3>
<p>Registered students list.</p>
<a href="#">Coming Soon</a>
</div>

</div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
