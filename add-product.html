<form id="productForm">

<label>Product Type</label>
<select id="productType">
<option>Assignment</option>
<option>Project</option>
<option>Practical</option>
<option>Internship</option>
<option>Study Material</option>
</select>

<label>Course</label>
<input type="text" id="course" placeholder="Example: BCA">

<label>Subject</label>
<input type="text" id="subject" placeholder="Subject Name">

<label>Product Title</label>
<input type="text" id="title" placeholder="Enter Product Title">

<label>Price (₹)</label>
<input type="number" id="price" placeholder="299">

<label>Description</label>
<textarea id="description" placeholder="Write Product Description"></textarea>

<label>Cover Image</label>
<input type="file" id="image">

<label>PDF File</label>
<input type="file" id="pdf">

<button type="submit">Publish Product</button>

</form>
